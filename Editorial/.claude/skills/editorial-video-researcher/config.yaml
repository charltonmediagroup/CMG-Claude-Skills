# URLs whose path contains ANY of these segments are dropped from feed parsing.
# Used to skip event recaps, opinion/commentary, sponsored content, and video posts —
# none of which fit the C-suite discussion-topic pipeline.
excluded_path_segments:
  - /event-news/
  - /commentary/
  - /co-written-partner/
  - /videos/

http_headers:
  User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
  Accept-Language: "en-US,en;q=0.9"
